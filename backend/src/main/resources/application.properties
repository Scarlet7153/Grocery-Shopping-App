spring.application.name=grocery-shopping-server
server.port=${PORT}
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.root=INFO
logging.level.com.grocery.server=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=86400000

# Momo configuration
payment.momo.partnerCode=${MOMO_PARTNER_CODE}
payment.momo.accessKey=${MOMO_ACCESS_KEY}
payment.momo.secretKey=${MOMO_SECRET_KEY}
payment.momo.requestUrl=${MOMO_API_ENDPOINT}
payment.momo.returnUrl=${MOMO_RETURN_URL}
payment.momo.notifyUrl=${MOMO_NOTIFY_URL}

server.externalBaseUrl=${SERVER_EXTERNAL_BASE_URL}

# =============================================
# REDIS CONFIGURATION
# =============================================
spring.redis.enabled=${SPRING_REDIS_ENABLED}
spring.redis.host=${SPRING_REDIS_HOST}
spring.redis.port=${SPRING_REDIS_PORT}
spring.redis.password=${SPRING_REDIS_PASSWORD}
spring.redis.timeout=${SPRING_REDIS_TIMEOUT}
spring.redis.lettuce.pool.max-active=${SPRING_REDIS_MAX_ACTIVE}
spring.redis.lettuce.pool.max-idle=${SPRING_REDIS_MAX_IDLE}
spring.redis.lettuce.pool.min-idle=${SPRING_REDIS_MIN_IDLE}
spring.redis.lettuce.pool.max-wait=${SPRING_REDIS_MAX_WAIT}

# WebSocket Configuration
websocket.endpoint=/ws
websocket.allowed-origins=*

# =============================================
# MONGODB CONFIGURATION
# =============================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=grocery_chat

# =============================================
# CLOUDINARY CONFIGURATION
# =============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.secure=${CLOUDINARY_SECURE}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB