name: grocery_shopping_app
description: Grocery Shopping App - Flutter Frontend
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  bloc: ^8.1.4
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.1.3
  
  # Networking & JSON
  dio: ^5.3.2
  http_parser: ^4.0.2
  http: ^1.2.1
  json_annotation: ^4.8.1
  pretty_dio_logger: ^1.3.1
  stomp_dart_client: ^2.1.3
  
  # UI & Utils
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Push Notifications (Comment tạm thời cho Phase 1)
  
  
  # Date/Time handling
  intl: any
  
  # Dependency Injection
  get_it: ^7.6.4

  # Logging
  logger: ^2.0.2+1  # Thêm logger dependency
  
  # Utilities
  collection: ^1.18.0
  permission_handler: ^11.0.1
  url_launcher: ^6.2.1
  package_info_plus: ^4.2.0
  flutter_dotenv: ^5.1.0
  
  # Icons
  cupertino_icons: ^1.0.2
  fl_chart: ^1.2.0

  # Sharing & Storage
  share_plus: ^10.1.0
  path_provider: ^2.1.2
  image: ^4.8.0
  app_links: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/

dependency_overrides:
  analyzer: ^5.12.0
  test: ^1.24.9
